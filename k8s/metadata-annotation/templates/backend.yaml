apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-backend
spec:
  serviceName: {{ .Release.Name }}-mda-backend
  selector:
    matchLabels:
      name: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        name: {{ .Release.Name }}-backend
        project: nfdi4health
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: mda
        app.kubernetes.io/component: backend
        app.kubernetes.io/managed-by: Helm
    spec:
      containers:
      - image: {{ .Values.images.backend }}
        name: backend
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 256Mi
            cpu: 100m
        env:
          - name: PYTHONPATH
            value: "/workspace"
          - name: API_SEMLOOKP
            value: https://semanticlookup.zbmed.de/ols/api/
          - name: INSTRUMENTS
            value: "/instruments"
          - name: DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: mda.{{ .Release.Name }}--postgres-cluster.credentials.postgresql.acid.zalan.do
                key: username
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mda.{{ .Release.Name }}--postgres-cluster.credentials.postgresql.acid.zalan.do
                key: password
          - name: API_PREDICT
            value: http://{{ .Release.Name }}-prediction:5000
          - name: DB_HOST
            value: {{ .Release.Name }}--postgres-cluster
        ports:
          - containerPort: 5000
        volumeMounts:
          - mountPath: "/instruments"
            name: "data-container"
      volumes:
        - name: "data-container"
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-mda-backend-file-data-container
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    name: {{ .Release.Name }}-backend-service
    project: nfdi4health
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: mda
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: Helm
spec:
  ports:
    - name: "5000"
      port: 5000
      targetPort: 5000
  selector:
    name: {{ .Release.Name }}-backend
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-mda-backend-file-data-container
  labels:
    name: {{ .Release.Name }}-mda-backend-file-data-container
    project: nfdi4health
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: mda
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: Helm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
