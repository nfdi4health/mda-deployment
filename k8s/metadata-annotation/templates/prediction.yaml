apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-prediction
spec:
  selector:
    matchLabels:
      name: {{ .Release.Name }}-prediction
  template:
    metadata:
      labels:
        name: {{ .Release.Name }}-prediction
        project: nfdi4health
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: mda
        app.kubernetes.io/component: prediction
        app.kubernetes.io/managed-by: Helm
    spec:
      containers:
      - image: {{ .Values.images.prediction }}
        name: prediction
        ports:
          - containerPort: 5000
        resources:
          limits:
            memory: 1500Mi
          requests:
            memory: 1000Mi
            cpu: 250m
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-prediction
  labels:
    project: nfdi4health
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: mda
    app.kubernetes.io/component: prediction
    app.kubernetes.io/managed-by: Helm
spec:
  ports:
    - name: "5000"
      port: 5000
      targetPort: 5000
  selector:
    name: {{ .Release.Name }}-prediction
